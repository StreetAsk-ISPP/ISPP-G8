# StreetAsk Docker Compose - Development Environment
# Usage: docker-compose up -d
# Note: Backend, Frontend and Database are deployed separately on Azure
#       This file is for local development only
# This configuration uses H2 in-memory database for rapid development

services:
  # MySQL Database for local development (commented out - using H2 for now)
  # Uncomment this section and update backend environment if you need MySQL
  # db:
  #   image: mysql:8.0
  #   container_name: streetask-db
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
  #     MYSQL_DATABASE: ${MYSQL_DATABASE:-streetask}
  #     MYSQL_USER: ${MYSQL_USER:-streetask}
  #     MYSQL_PASSWORD: ${MYSQL_PASSWORD:-streetask}
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s
  #   restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: streetask-backend
    ports:
      - "8080:8080"
      - "5005:5005"
    volumes:
      - .:/app
      - maven_cache:/root/.m2
    environment:
      SPRING_PROFILES_ACTIVE: default
      # For MySQL, uncomment these and comment out the line above:
      # SPRING_PROFILES_ACTIVE: mysql
      # MYSQL_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-streetask}?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=UTC
      # MYSQL_USER: ${MYSQL_USER:-streetask}
      # MYSQL_PASSWORD: ${MYSQL_PASSWORD:-streetask}
    # depends_on:  # Uncomment when using MySQL
    #   db:
    #     condition: service_healthy
    restart: unless-stopped
    command: ./mvnw spring-boot:run -DskipTests

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: streetask-frontend
    ports:
      - "8081:8081"
    volumes:
      # Sincroniza tu código local con el contenedor en tiempo real
      - ./frontend:/app
      - /app/node_modules
    environment:
      EXPO_PUBLIC_API_BASE_URL: http://localhost:8080
      EXPO_PUBLIC_API_TIMEOUT_MS: 10000
      EXPO_PUBLIC_VAPID_PUBLIC_KEY: BCzmM4oFvgyIoji531RyMjAMxwSEcgRHivSvGBtDeP93MssCAQdfnZZlZ-24mpUMGlCRselBYpHj1onx9eHwqcQ
      # Obliga a Expo a usar el método de "polling" para detectar cambios en los archivos
      # Esto es muy importante cuando se usan volúmenes de Docker en Windows o Mac
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"

# Uncomment if using MySQL
volumes:
#  mysql_data:
#    driver: local
  maven_cache: