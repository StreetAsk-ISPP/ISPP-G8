maven.basedir=@project.basedir@
# database init, supports mysql too
#spring.datasource.schema=classpath*:db/${database}/schema.sql
spring.mvc.pathpattern.matching-strategy=ant_path_matcher

# H2 Console (for development - access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:streetask
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.security.user.name=admin 
spring.security.user.password=admin
server.port=8080
# Web
spring.thymeleaf.mode=HTML
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Initialize data with H2-compatible data.sql
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql


# Internationalization
spring.messages.basename=messages/messages




# Actuator / Management
#management.endpoints.web.base-path=/manage
#management.endpoints.web.exposure.include=*

# Logging
logging.level.org.springframework=INFO
# logging.level.org.springframework.web=DEBUG
# logging.level.org.springframework.context.annotation=TRACE

# Maximum time static resources should be cached
spring.resources.cache.cachecontrol.max-age=12h

# App Properties
streetask.app.jwtSecret= streetaskSecretKey
#       Expiration set to 1 day 
streetask.app.jwtExpirationMs= 86400000 

# API Properties
api.version=1.0-SNAPSHOT
tos.uri=terms-of-service
api.server.url=I don't know
api.description=The API is used to ...
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Mail (Brevo SMTP)
spring.mail.host=${BREVO_SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${BREVO_SMTP_PORT:587}
spring.mail.username=${BREVO_SMTP_USERNAME:}
spring.mail.password=${BREVO_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
streetask.mail.from=${BREVO_MAIL_FROM:streetask0@gmail.com}

# WebSocket
streetask.websocket.endpoint=/ws
streetask.websocket.allowed-origin-patterns=${STREETASK_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
streetask.websocket.zone.cell-size-degrees=0.02
streetask.websocket.topic.zone-prefix=/topic/zones
streetask.websocket.topic.zone-suffix=/notifications
streetask.websocket.topic.user-queue=/queue/notifications

# Web Push (VAPID)
streetask.web-push.subject=${STREETASK_WEB_PUSH_SUBJECT:mailto:streetask.notifications@gmail.com}
