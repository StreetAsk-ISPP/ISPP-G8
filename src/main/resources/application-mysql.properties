# MySQL Configuration
# Uses env vars if available (Azure), falls back to local defaults (Docker Compose)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/streetask?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${MYSQL_USER:streetask}
spring.datasource.password=${MYSQL_PASSWORD:streetask}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${MYSQL_DDL_AUTO:validate}
spring.jpa.defer-datasource-initialization=false

# Flyway migrations (schema versioning)
spring.flyway.enabled=${MYSQL_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Legacy SQL init (disabled by default to avoid conflicts with Flyway)
spring.sql.init.mode=${MYSQL_SQL_INIT_MODE:never}
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.sql.init.data-locations=classpath:data-mysql.sql
spring.sql.init.continue-on-error=true
