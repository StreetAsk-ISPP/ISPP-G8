# MySQL Configuration
# Uses env vars if available (Azure), falls back to local defaults (Docker Compose)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/streetask?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:streetask}
spring.datasource.password=${MYSQL_PASSWORD:streetask}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${MYSQL_DDL_AUTO:update}
spring.jpa.defer-datasource-initialization=true

# Initialize data.sql
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-mysql.sql
spring.sql.init.continue-on-error=true
