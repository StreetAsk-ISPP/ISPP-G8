# Database Configuration (Pre-Production - Render)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/streetask?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:streetask}
spring.datasource.password=${MYSQL_PASSWORD:streetask}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# Wait for tables to be created before inserting data
spring.jpa.defer-datasource-initialization=true

# Force data initialization in MySQL
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-mysql.sql
# We intentionally OMIT continue-on-error=true to expose any failures in Render