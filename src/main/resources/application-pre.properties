# Database Configuration (Pre-Production - Render)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/streetask?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${MYSQL_USER:streetask}
spring.datasource.password=${MYSQL_PASSWORD:streetask}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# Wait for tables to be created before inserting data
spring.jpa.defer-datasource-initialization=true

# In pre-production we rely on Hibernate update only.
# Mixing sql.init scripts with ddl-auto can leave schema partially applied between deploys.
spring.sql.init.mode=never

# CORS (HTTP + WebSocket) for local development and Render frontend
streetask.http.allowed-origin-patterns=${STREETASK_HTTP_ALLOWED_ORIGIN_PATTERNS:http://localhost:8080,http://localhost:8081,http://localhost:19006,https://streetask.expo.app,https://streetask-preprod-frontend.onrender.com}
streetask.websocket.allowed-origin-patterns=${STREETASK_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://streetask-preprod-frontend.onrender.com}

