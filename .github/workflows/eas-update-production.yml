name: Deploy Frontend Web to EAS

# 1. Cuándo se ejecuta este workflow
on:
  push:
    branches:
      - main
      - feature/frontend-cd

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🛠️ Configurar Expo y EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Instalar dependencias
        run: npm install

      - name: Exportar código web
        run: npx expo export --platform web

      - name: Desplegar a producción en EAS Hosting
        run: eas deploy --prod --non-interactive