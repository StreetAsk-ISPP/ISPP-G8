name: Continuous Deployment to Azure Container Apps
 
on:
  pull_request:
    branches:
      - main
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
 
    steps:
 
      - name: Checkout source code
        uses: actions/checkout@v3
 
      - name: Login to Docker Hub
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      - name: Build and push Docker image
        uses: docker/build-push-action@0a97817b6ade9f46837855d676c4cca3a2471fc9
        with:
          context: .
          push: true
          tags: streetask/backend:latest # Usamos 'latest' para el despliegue continuo
 
      - name: Azure Login
        uses: azure/login@cb79c773a3cfa27f31f25eb3f677781210c9ce3d
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
 
      - name: Deploy to Container App
        uses: azure/CLI@4db43908b9df2e7ac93c8275a8f9a448c59338dd
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            az containerapp update \
              --name sprint1-backend \
              --resource-group sprint1-recursos \
              --image streetask/backend:latest \
              --max-replicas 4 \
              --set-env-vars \
                SPRING_PROFILES_ACTIVE=mysql \
                MYSQL_URL=${{ secrets.MYSQL_URL }} \
                MYSQL_USER=${{ secrets.MYSQL_USER }} \
                MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
