name: Continuous Deployment to Azure Container Apps
 
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - fix/backend-deploy
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
 
    steps:
 
      - name: Checkout source code
        uses: actions/checkout@v3
 
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: streetask/backend:latest # Usamos 'latest' para el despliegue continuo
 
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
 
      - name: Deploy to Container App
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            az containerapp update \
              --name sprint2-backend \
              --resource-group sprint1-recursos \
              --image streetask/backend:latest \
              --max-replicas 4 \
              --min-replicas 1 \
              --set-env-vars \
                SPRING_PROFILES_ACTIVE=mysql \
                MYSQL_URL=${{ secrets.MYSQL_URL }} \
                MYSQL_USER=${{ secrets.MYSQL_USER }} \
                MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
