name: Performance Metrics Report

on:
  workflow_dispatch:
    inputs:
      sprint:
        description: 'Sprint number to analyze (e.g., 2 analyzes only issues with label SPRINT 2). Empty = all sprints'
        required: false
        default: ''
      threshold:
        description: 'Performance threshold (0-10, default: 6.0)'
        required: false
        default: '6.0'
  schedule:
    - cron: '0 13 * * 2'

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  generate-performance-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'schedule' && 'trunk' || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate performance metrics report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_SPRINT: ${{ github.event.inputs.sprint || '' }}
          PERFORMANCE_THRESHOLD: ${{ github.event.inputs.threshold || '6.0' }}
        run: python scripts/generate_performance_metrics.py

      - name: Commit and push metrics report
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            BRANCH_NAME="trunk"
          else
            BRANCH_NAME="${GITHUB_REF_NAME}"
          fi
          git add metrics/performance-metrics.md

          if git diff --cached --quiet; then
            echo "No report changes detected. Skipping commit/push."
            exit 0
          fi

          git commit -m "docs(metrics): update weekly performance metrics report"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${BRANCH_NAME}"; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi

            echo "Push failed on attempt ${attempt}. Fetching and rebasing..."
            git fetch origin "${BRANCH_NAME}"
            if ! git rebase "origin/${BRANCH_NAME}"; then
              echo "Rebase failed. Aborting rebase."
              git rebase --abort || true
              exit 1
            fi
          done

          echo "Push failed after 3 attempts."
          exit 1
