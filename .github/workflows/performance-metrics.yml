name: Performance Metrics Report

on:
  workflow_dispatch:
    inputs:
      sprint:
        description: 'Sprint number to analyze (e.g., 2 analyzes only issues with label SPRINT 2). Empty = all sprints'
        required: false
        default: ''
      threshold:
        description: 'Performance threshold (0-10, default: 6.0)'
        required: false
        default: '6.0'
  schedule:
    - cron: '0 13 * * 2'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/performance-metrics.yml'
      - 'scripts/generate_performance_metrics.py'

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  generate-performance-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate performance metrics report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_SPRINT: ${{ github.event.inputs.sprint || '' }}
          PERFORMANCE_THRESHOLD: ${{ github.event.inputs.threshold || '6.0' }}
        run: python scripts/generate_performance_metrics.py

      - name: Commit and push metrics report
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/performance-metrics.md

          if git diff --cached --quiet; then
            echo "No report changes detected. Skipping commit/push."
            exit 0
          fi

          git commit -m "docs: update weekly performance metrics report"
          git push
